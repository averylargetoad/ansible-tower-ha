---
# Monitoring Role - Main Tasks
- name: Create monitoring system user
  user:
    name: prometheus
    system: yes
    shell: /bin/false
    create_home: no

- name: Install monitoring prerequisites
  package:
    name:
      - curl
      - tar
      - python3-pip
    state: present

- name: Install Python monitoring libraries
  pip:
    name:
      - prometheus-client
      - psycopg2-binary
    state: present

# Prometheus Installation
- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
    - /var/log/prometheus

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install Prometheus binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool

- name: Configure Prometheus
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart prometheus

- name: Create Prometheus alerting rules
  template:
    src: alert_rules.yml.j2
    dest: /etc/prometheus/alert_rules.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: reload prometheus

- name: Create Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify: restart prometheus

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes

# Alertmanager Installation
- name: Download Alertmanager
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: /tmp/alertmanager.tar.gz
    mode: '0644'

- name: Extract Alertmanager
  unarchive:
    src: /tmp/alertmanager.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install Alertmanager binary
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager"
    dest: /usr/local/bin/alertmanager
    mode: '0755'
    remote_src: yes

- name: Create Alertmanager directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Configure Alertmanager
  template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart alertmanager

- name: Create Alertmanager systemd service
  template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: '0644'
  notify: restart alertmanager

- name: Enable and start Alertmanager
  systemd:
    name: alertmanager
    state: started
    enabled: yes
    daemon_reload: yes

# Grafana Installation
- name: Add Grafana GPG key
  rpm_key:
    key: https://packages.grafana.com/gpg.key
    state: present
  when: ansible_os_family == "RedHat"

- name: Add Grafana repository
  yum_repository:
    name: grafana
    description: Grafana Repository
    baseurl: https://packages.grafana.com/oss/rpm
    gpgcheck: yes
    gpgkey: https://packages.grafana.com/gpg.key
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Install Grafana
  package:
    name: grafana
    state: present

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    mode: '0640'
  notify: restart grafana

- name: Create Grafana provisioning directories
  file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards
    - /var/lib/grafana/dashboards

- name: Provision Prometheus datasource
  template:
    src: grafana_datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Provision Grafana dashboards
  template:
    src: grafana_dashboard_provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/ansible-tower.yml
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Copy Tower monitoring dashboard
  copy:
    src: tower_dashboard.json
    dest: /var/lib/grafana/dashboards/tower_dashboard.json
    owner: grafana
    group: grafana
    mode: '0644'

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes

# Configure firewall
- name: Configure firewall for monitoring services
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 9090/tcp  # Prometheus
    - 3000/tcp  # Grafana
    - 9093/tcp  # Alertmanager
  when: ansible_os_family == "RedHat"

- name: Install exporters on all nodes
  include_tasks: exporters.yml
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
