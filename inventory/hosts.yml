---
# Ansible Tower HA Inventory
all:
  children:
    # Ansible Tower/AWX Cluster Nodes
    tower_cluster:
      hosts:
        tower-node1:
          ansible_host: 192.168.1.11
          ansible_user: ansible
        tower-node2:
          ansible_host: 192.168.1.12
          ansible_user: ansible
        tower-node3:
          ansible_host: 192.168.1.13
          ansible_user: ansible
      vars:
        tower_admin_password: "{{ vault_tower_admin_password }}"
        tower_pg_password: "{{ vault_tower_pg_password }}"

    # PostgreSQL Database Cluster for HA
    database_cluster:
      hosts:
        db-primary:
          ansible_host: 192.168.1.21
          ansible_user: ansible
          postgresql_role: primary
        db-standby1:
          ansible_host: 192.168.1.22
          ansible_user: ansible
          postgresql_role: standby
        db-standby2:
          ansible_host: 192.168.1.23
          ansible_user: ansible
          postgresql_role: standby
      vars:
        postgresql_version: 13
        postgresql_replication_password: "{{ vault_pg_replication_password }}"

    # Load Balancer (HAProxy)
    load_balancers:
      hosts:
        lb-node1:
          ansible_host: 192.168.1.31
          ansible_user: ansible
        lb-node2:
          ansible_host: 192.168.1.32
          ansible_user: ansible
      vars:
        keepalived_vip: 192.168.1.30
        keepalived_priority_node1: 100
        keepalived_priority_node2: 90

    # Collection Development Server
    collection_dev:
      hosts:
        dev-server:
          ansible_host: 192.168.1.40
          ansible_user: ansible
      vars:
        collection_namespace: myorg
        collection_git_repos: []
        ansible_galaxy_server_url: https://galaxy.ansible.com

    # Monitoring and Observability Stack
    monitoring:
      hosts:
        monitoring-server:
          ansible_host: 192.168.1.50
          ansible_user: ansible
      vars:
        prometheus_version: "2.45.0"
        grafana_version: "10.0.0"
        alertmanager_version: "0.26.0"
        grafana_admin_password: "{{ vault_grafana_admin_password }}"

    # Remote Control/Management Server
    remote_control:
      hosts:
        control-server:
          ansible_host: 192.168.1.60
          ansible_user: ansible
      vars:
        semaphore_version: "2.9.0"
        semaphore_admin_password: "{{ vault_semaphore_admin_password }}"

  vars:
    # Global variables
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    ansible_become_method: sudo
