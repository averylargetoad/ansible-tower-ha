---
# Ansible Tower HA Inventory - Flexible IP Assignment
#
# This inventory supports both static and dynamic IP assignment:
# 1. Static: Specify exact IPs within defined subnet ranges
# 2. Dynamic: Use hostname resolution or cloud provider discovery
#
# Configuration modes:
# - Set 'use_static_ips: true' for static IP assignment within ranges
# - Set 'use_static_ips: false' for dynamic assignment (DNS/cloud)

all:
  vars:
    # Global configuration
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    ansible_become_method: sudo

    # IP Assignment Mode
    # Options: true (static within ranges), false (dynamic/DNS)
    use_static_ips: true

    # Network Configuration - Define your subnets and ranges
    network_config:
      base_network: "192.168.1.0/24"
      subnets:
        tower_subnet: "192.168.1.10-19"        # Tower nodes: .10-.19
        database_subnet: "192.168.1.20-29"     # Database nodes: .20-.29
        loadbalancer_subnet: "192.168.1.30-39" # Load balancers: .30-.39
        services_subnet: "192.168.1.40-69"     # Other services: .40-.69

      # VIP and floating IPs
      vips:
        loadbalancer_vip: "192.168.1.30"

    # Default connection settings
    default_ansible_user: ansible
    default_ssh_port: 22

  children:
    # ===== ANSIBLE TOWER/AWX CLUSTER =====
    tower_cluster:
      hosts:
        # Static IP mode: Specify IPs within tower_subnet range (192.168.1.10-19)
        tower-node1:
          ansible_host: "{{ '192.168.1.11' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.11"  # Used when use_static_ips=true

        tower-node2:
          ansible_host: "{{ '192.168.1.12' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.12"

        tower-node3:
          ansible_host: "{{ '192.168.1.13' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.13"

        # Add more nodes as needed (IPs .14-.19 available)
        # tower-node4:
        #   ansible_host: "{{ '192.168.1.14' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
        #   ansible_user: "{{ default_ansible_user }}"
        #   static_ip: "192.168.1.14"

      vars:
        tower_admin_password: "{{ vault_tower_admin_password }}"
        tower_pg_password: "{{ vault_tower_pg_password }}"
        # Cluster-specific configuration
        cluster_subnet: "{{ network_config.subnets.tower_subnet }}"

    # ===== POSTGRESQL DATABASE CLUSTER =====
    database_cluster:
      hosts:
        # Static IP mode: Specify IPs within database_subnet range (192.168.1.20-29)
        db-primary:
          ansible_host: "{{ '192.168.1.21' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          postgresql_role: primary
          static_ip: "192.168.1.21"

        db-standby1:
          ansible_host: "{{ '192.168.1.22' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          postgresql_role: standby
          static_ip: "192.168.1.22"

        db-standby2:
          ansible_host: "{{ '192.168.1.23' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          postgresql_role: standby
          static_ip: "192.168.1.23"

        # Additional standby nodes can use IPs .24-.29
        # db-standby3:
        #   ansible_host: "{{ '192.168.1.24' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
        #   ansible_user: "{{ default_ansible_user }}"
        #   postgresql_role: standby
        #   static_ip: "192.168.1.24"

      vars:
        postgresql_version: 13
        postgresql_replication_password: "{{ vault_pg_replication_password }}"
        cluster_subnet: "{{ network_config.subnets.database_subnet }}"

    # ===== LOAD BALANCERS =====
    load_balancers:
      hosts:
        # Static IP mode: Specify IPs within loadbalancer_subnet range (192.168.1.30-39)
        # Note: .30 is reserved for VIP
        lb-node1:
          ansible_host: "{{ '192.168.1.31' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.31"
          keepalived_priority: 100  # Higher priority = master

        lb-node2:
          ansible_host: "{{ '192.168.1.32' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.32"
          keepalived_priority: 90   # Lower priority = backup

      vars:
        keepalived_vip: "{{ network_config.vips.loadbalancer_vip }}"
        keepalived_priority_node1: 100
        keepalived_priority_node2: 90
        cluster_subnet: "{{ network_config.subnets.loadbalancer_subnet }}"

    # ===== COLLECTION DEVELOPMENT SERVER =====
    collection_dev:
      hosts:
        # Static IP mode: Uses services_subnet range (192.168.1.40-69)
        dev-server:
          ansible_host: "{{ '192.168.1.40' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.40"

      vars:
        collection_namespace: myorg
        collection_git_repos: []
        ansible_galaxy_server_url: https://galaxy.ansible.com

    # ===== MONITORING STACK =====
    monitoring:
      hosts:
        # Static IP mode: Uses services_subnet range (192.168.1.40-69)
        monitoring-server:
          ansible_host: "{{ '192.168.1.50' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.50"

      vars:
        prometheus_version: "2.45.0"
        grafana_version: "10.0.0"
        alertmanager_version: "0.26.0"
        grafana_admin_password: "{{ vault_grafana_admin_password }}"

    # ===== REMOTE CONTROL/MANAGEMENT =====
    remote_control:
      hosts:
        # Static IP mode: Uses services_subnet range (192.168.1.40-69)
        control-server:
          ansible_host: "{{ '192.168.1.60' if use_static_ips else inventory_hostname + '.' + ansible_domain | default(inventory_hostname) }}"
          ansible_user: "{{ default_ansible_user }}"
          static_ip: "192.168.1.60"

      vars:
        semaphore_version: "2.9.0"
        semaphore_admin_password: "{{ vault_semaphore_admin_password }}"

# ===== EXAMPLE CONFIGURATIONS =====
#
# STATIC IP ASSIGNMENT (Current default):
# - Set use_static_ips: true
# - IPs are assigned within defined subnet ranges
# - Tower: 192.168.1.10-19, DB: 192.168.1.20-29, etc.
#
# DYNAMIC/DNS ASSIGNMENT:
# - Set use_static_ips: false
# - Set ansible_domain: "mydomain.com" (optional)
# - Hosts resolve via DNS (e.g., tower-node1.mydomain.com)
#
# CLOUD PROVIDER DYNAMIC ASSIGNMENT:
# - Set use_static_ips: false
# - Use cloud provider plugins (AWS EC2, Azure, GCP, etc.)
# - Example for AWS:
#   plugin: amazon.aws.aws_ec2
#   regions: [us-east-1]
#   filters:
#     tag:Environment: production
#     tag:Role: tower
#
# MIXED ENVIRONMENTS:
# - Override ansible_host per host for specific needs
# - Use static IPs for some, dynamic for others